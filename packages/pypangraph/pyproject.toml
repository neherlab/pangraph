[build-system]
  build-backend = 'setuptools.build_meta'
  requires = ['setuptools>=61.0']

[project]
  classifiers = ['Programming Language :: Python :: 3', 'License :: OSI Approved :: MIT License', 'Operating System :: OS Independent']
  dependencies = ['matplotlib', 'numpy', 'pandas', 'biopython', 'jsonschema']
  description = 'package to manipulate pangenomes produced by PanGraph'
  name = 'pypangraph'
  readme = 'README.md'
  requires-python = '>=3.9'
  version = '1.1.0'

  [[project.authors]]
    email = 'mmolari91@gmail.com'
    name = 'Marco Molari'

  [project.urls]
    Documentation = 'https://docs.pangraph.org'
    Homepage = 'https://docs.pangraph.org'
    Issues = 'https://github.com/neherlab/pangraph/issues'
    Repository = 'https://github.com/neherlab/pangraph'

[tool]
  [tool.setuptools]
    [tool.setuptools.package-data]
      'Pangraph.schema.json' = ['Pangraph.schema.json']
